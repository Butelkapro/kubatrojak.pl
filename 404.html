<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/globalfiles/page_icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/globalfiles/page_icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/globalfiles/page_icon/favicon-16x16.png">
    <link rel="manifest" href="/globalfiles/page_icon/site.webmanifest">
    <title>404 - Nie znaleziono strony | Kuba Trojak</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { max-width: 450px; padding: 40px; text-align: center; }
        h1 { font-size: 2.8rem; margin-bottom: 30px; font-weight: 800; letter-spacing: -1px; }
        h2 { font-size: 1.8rem; margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .button-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: block; padding: 14px 20px; border-radius: 10px; text-decoration: none; font-weight: 600; transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background-color: #ffffff; color: #2c2c2c; }
        .btn-primary:hover { background-color: #e0e0e0; transform: translateY(-2px); }
        footer { margin-top: 50px; font-size: 0.8rem; color: #555555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Błąd 404 <br>
            Strona nie istnieje</h1>
        <div class="button-group">
            <a href="/" class="btn btn-primary">Wróć do strony głównej</a>
        </div>
        <footer id="footer-date">&copy; 2026 <a href="https://kubatrojak.pl" style="color: inherit; text-decoration: none;">kubatrojak.pl</a> | <a href="/aboutsite/" style="color: inherit; text-decoration: none;">O stronie</a></footer>
    </div>

    <script>
        const startYear = 2026;
        const currentYear = new Date().getFullYear();
        const footer = document.getElementById('footer-date');
        const displayYear = currentYear > startYear ? `${startYear}-${currentYear}` : startYear;
        footer.innerHTML = `&copy; ${displayYear} <a href="https://kubatrojak.pl" style="color: inherit; text-decoration: none;">kubatrojak.pl</a> | <a href="/aboutsite/" style="color: inherit; text-decoration: none;">O stronie</a>`;
    </script>
</body>
</html>
