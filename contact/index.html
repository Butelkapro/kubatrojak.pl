<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Kuba Trojak</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { max-width: 450px; padding: 40px; text-align: center; }
        h1 { font-size: 2.8rem; margin-bottom: 25px; font-weight: 800; letter-spacing: -1px; }
        .button-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { display: block; padding: 14px 20px; border-radius: 10px; text-decoration: none; font-weight: 600; transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background-color: #ffffff; color: #2c2c2c; }
        .btn-secondary { background-color: transparent; color: #ffffff; }
        .btn-primary:hover, .btn-secondary:hover { transform: translateY(-2px); background-color: rgba(255,255,255,0.9); color: #2c2c2c; }
        .back { margin-top: 40px; display: block; color: #888888; text-decoration: none; font-size: 0.9rem; }
        footer { margin-top: 50px; font-size: 0.8rem; color: #555555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Kontakt</h1>
        <div class="button-group">
            <a href="mailto:kontakt@kubatrojak.pl" class="btn btn-primary">Napisz wiadomość</a>
            <a href="https://github.com/Butelkapro" target="_blank" class="btn btn-secondary">Projekty (GitHub)</a>
        </div>
        <a href="/" class="back">← Wróć do strony głównej</a>
        <footer id="footer-date">&copy; 2026 kubatrojak.pl</footer>
    </div>

    <script>
        const startYear = 2026;
        const currentYear = new Date().getFullYear();
        const footer = document.getElementById('footer-date');
        if (currentYear > startYear) {
            footer.innerHTML = `&copy; ${startYear}-${currentYear} kubatrojak.pl`;
        } else {
            footer.innerHTML = `&copy; ${startYear} kubatrojak.pl`;
        }
    </script>
</body>
</html>
