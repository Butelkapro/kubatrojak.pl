<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <title>O mnie | Kuba Trojak</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #2c2c2c; color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .location { color: #888888; font-size: 0.9rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .bio { font-size: 1.1rem; color: #cccccc; margin-bottom: 35px; }
        .bio b { color: #ffffff; }
        .back { color: #888888; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .back:hover { color: #ffffff; }
        footer { margin-top: 50px; font-size: 0.8rem; color: #555555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>O mnie</h1>
        <img src="foto.jpg" alt="Kuba Trojak" class="profile-img">

        <p class="bio">
            Interesuję się informatyką, w tym <b>komputerami, serwerami</b> oraz <b>architekturą sieciową</b>. Buduję własne rozwiązania i dbam o porządek w cyfrowym świecie.
